name: permits

services:
  db:
    image: postgis/postgis
    build:
      context: https://github.com/postgis/docker-postgis.git#master:18-3.6
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_CONNECTION_STRING: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PERMITS_CORS_ORIGINS: ${PERMITS_CORS_ORIGINS}
      PERMITS_REPO_URL: ${PERMITS_REPO_URL}
      PERMITS_ENRICH_TIMEOUT: ${PERMITS_ENRICH_TIMEOUT}
      PERMITS_WIKIDATA_SPARQL_API_URL: ${PERMITS_WIKIDATA_SPARQL_API_URL}
      PERMITS_OSM_SPARQL_API_URL: ${PERMITS_OSM_SPARQL_API_URL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
